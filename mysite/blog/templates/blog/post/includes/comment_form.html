<h2> Add a new comment </h2>
<form class='commentForm' action = "{% url "blog:post_comment" post.id %}" method='post'>
    {{ form.name.as_field_group }} <br>
    {{ form.email.as_field_group }} <br>
    {{ form.body.as_field_group }}
    {% csrf_token %}
    <p><input type='submit' value='Add Comment'></p>
</form>
